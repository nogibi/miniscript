name: Build Node CLI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v15
        with:
          version: latest

      - name: Build single-file Node CLI
        run: make miniscript-node.js

      - name: Smoke test build Node runtime
        run: |
          node miniscript.js compile 'and(pk(A),older(1000))'
          node miniscript.js analyze 'and_v(v:pk(A),older(1000))'

      - name: Upload Node CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: miniscript
          path: miniscript.js
          if-no-files-found: error
